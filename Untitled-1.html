<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Website</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
        }
        
        header {
            background: #333;
            color: white;
            padding: 1rem;
            text-align: center;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .destinations {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }
        
        .card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }
        
        .card-content {
            padding: 1.5rem;
        }
        
        .card h2 {
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>🌍 Travel Adventures</h1>
        <p>Explore the World's Best Destinations</p>
    </header>
    
    <div class="container">
        <div class="destinations">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1488646953014-85cb44e25828?w=400" alt="Paris">
                <div class="card-content">
                    <h2>Paris</h2>
                    <p>The City of Light offers iconic landmarks and world-class cuisine.</p>
                </div>
            </div>
            
            <div class="card">
                <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400" alt="Mountains">
                <div class="card-content">
                    <h2>Swiss Alps</h2>
                    <p>Experience stunning mountain scenery and outdoor adventures.</p>
                </div>
            </div>
            
            <div class="card">
                <img src="https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?w=400" alt="Beach">
                <div class="card-content">
                    <h2>Bali Beach</h2>
                    <p>Relax on pristine beaches with crystal clear waters.</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
