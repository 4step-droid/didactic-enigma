<!--add new function for toggle the place-->
<script>
function togglePlace(placeId) {
    var place = document.getElementById(placeId);
    if (place.style.display === "none") {
        place.style.display = "block";
    } else {
        place.style.display = "none";
    }
}
</script>
new function for coloring the place
<script>
function colorPlace(placeId, color) {
    var place = document.getElementById(placeId);
    place.style.backgroundColor = color;
}
</script>
