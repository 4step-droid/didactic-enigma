<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Website</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
        
        header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: white;
            padding: 2rem 1rem;
            text-align: center;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
        }
        
        header h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }
        
        .destinations {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }
        
        .card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
        }
        
        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        
        .card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        
        .card:hover img {
            transform: scale(1.05);
        }
        
        .card-content {
            padding: 2rem;
        }
        
        .card h2 {
            margin-bottom: 1rem;
            color: #2c3e50;
            font-size: 1.5rem;
        }
        
        .card p {
            color: #7f8c8d;
            line-height: 1.7;
        }
        
        @media (max-width: 768px) {
            header h1 {
                font-size: 2rem;
            }
            
            .container {
                padding: 2rem 1rem;
            }
            
            .destinations {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>🌍 Travel Adventures</h1>
        <p>Explore the World's Best Destinations</p>
    </header>
    
    <div class="container">
        <div class="destinations">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1488646953014-85cb44e25828?w=400" alt="Paris">
                <div class="card-content">
                    <h2>Paris</h2>
                    <p>The City of Light offers iconic landmarks and world-class cuisine.</p>
                </div>
            </div>
            
            <div class="card">
                <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400" alt="Mountains">
                <div class="card-content">
                    <h2>Swiss Alps</h2>
                    <p>Experience stunning mountain scenery and outdoor adventures.</p>
                </div>
            </div>
            
            <div class="card">
                <img src="https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?w=400" alt="Beach">
                <div class="card-content">
                    <h2>Bali Beach</h2>
                    <p>Relax on pristine beaches with crystal clear waters.</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
